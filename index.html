<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正國中特教組 - 特教助理員特休申請系統</title>
    <style>
        /* 溫馨可愛風配色與圓角設計 */
        body { 
            font-family: "Microsoft JhengHei", Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #fff9f3; 
            color: #4a4a4a; 
        }
        .container { 
            max-width: 550px; 
            margin: 20px auto; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 8px 24px rgba(218, 142, 87, 0.15); 
            border: 2px solid #ffe6d5;
        }
        .school-badge {
            text-align: center;
            font-size: 14px;
            background: #ffe3d1;
            color: #d35400;
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .header-area {
            text-align: center;
            margin-bottom: 20px;
        }
        h2 { 
            margin: 0;
            color: #d35400; 
            font-size: 24px;
        }
        .sub-title { 
            color: #7f8c8d; 
            margin-top: 5px; 
            font-size: 15px; 
        }
        .notice-box {
            background-color: #fff4ec;
            border-left: 5px solid #ff9f43;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
            color: #ba5d12;
        }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #6e4a3b; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box; 
            border: 2px solid #ffdcd0; 
            border-radius: 12px; 
            font-size: 16px;
            background-color: #fffcf9;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #ff9f43;
            background-color: #ffffff;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #ff9f43; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 17px; 
            cursor: pointer; 
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(255, 159, 67, 0.3);
            transition: all 0.2s;
        }
        button:hover { background-color: #f39c12; transform: translateY(-1px); }
        button:disabled { background-color: #dcdde1; box-shadow: none; cursor: not-allowed; }
        .result-box { 
            background: #fff0e6; 
            padding: 18px; 
            border-radius: 16px; 
            margin-top: 15px; 
            text-align: center; 
            font-size: 16px; 
            font-weight: bold;
            color: #5c3d2e;
            border: 1px dashed #ffbd9b;
        }
        .remaining-hours { font-size: 32px; color: #e67e22; font-weight: bold; display: block; margin-top: 5px;}
        .loading { text-align: center; color: #e67e22; font-weight: bold; margin-bottom: 15px; }
        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #bdc3c7;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <span class="school-badge">🏫 中正國中特教組</span>
        <h2>特教助理員特休申請系統</h2>
        <div class="sub-title">114 學年度差勤自主管理</div>
    </div>
